ai_usage_summary: |
  Claude (Opus 4.8, via Claude Code) was used both for engineering assistance and,
  offline, as a relevance judge: it read each of the ~120 distinct profile templates
  in the pool and graded them 0-5 against the job description. Those grades are a
  pre-computation artifact (eval/template_grades.json). The ranking step (rank.py)
  makes no LLM or network calls; it is numpy/pandas only and runs on CPU.

methodology_summary: |
  We treat ranking as graded relevance estimation. The 100k pool is generated from
  only ~120 distinct profile templates (76 summaries, 44 career descriptions after
  normalising out numbers), so we grade each unique template once, 0-5, against the
  job description with an offline LLM judge, then every candidate inherits its
  template grade. A deterministic integrity gate excludes logically impossible
  "honeypot" profiles (experience exceeding the career timeline, expert skills used
  zero months, inflated job durations); without it, honeypots flood the top 10 and
  NDCG@10 falls from 1.00 to 0.84. The judge grade is the primary relevance signal;
  structured modifiers (the 5-9 experience band, India location, recruiter
  availability, product-vs-services history, GitHub activity) order candidates within
  a tier, which is where the top 10 is decided. Reasoning strings are generated
  deterministically from each candidate's real facts, so they cite actual skills and
  employers and never hallucinate. Ranking is CPU-only, offline, and runs in ~35s.

