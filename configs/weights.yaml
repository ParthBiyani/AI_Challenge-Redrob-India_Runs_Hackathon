# rubric scoring weights. tuned later against the oracle labels.
# component weights sum to 1.0 so the base score stays in [0, 1].
components:
  role_fit: 0.20
  must_have_evidence: 0.20
  ranking_evidence: 0.20
  experience_fit: 0.12
  domain_fit: 0.08
  product_ratio: 0.08
  location_fit: 0.08
  external_validation: 0.04

# multiplicative penalties for the job description disqualifiers.
gates:
  consulting_only: 0.35
  research_only: 0.45
  non_india: 0.55
  title_chaser: 0.80

# bounded availability modifier so behaviour never dominates fit.
behavioral:
  inactive_days_strong: 180
  inactive_days_mild: 90
  recency_strong_mult: 0.70
  recency_mild_mult: 0.90
  response_base: 0.90
  response_slope: 0.20
  open_to_work_mult: 1.05
  notice_good_days: 30
  notice_good_mult: 1.03
  notice_long_days: 90
  notice_long_mult: 0.97
  floor: 0.55
  ceil: 1.10
