# the offline judge grade is the primary relevance signal; structured modifiers
# order candidates within a relevance tier, which is where the top-10 is decided.

judge:
  summary_weight: 0.6
  description_weight: 0.4

# modifier factor = floor + (1 - floor) * weighted(components). stays in [floor, 1].
modifier:
  floor: 0.6
  components:
    experience_fit: 0.50
    location_fit: 0.20
    product_ratio: 0.15
    external_validation: 0.15

# multiplicative penalties for the job description disqualifiers.
gates:
  consulting_only: 0.50
  research_only: 0.60
  non_india: 0.60
  title_chaser: 0.85

# bounded availability modifier so behaviour never dominates fit.
behavioral:
  inactive_days_strong: 180
  inactive_days_mild: 90
  recency_strong_mult: 0.70
  recency_mild_mult: 0.90
  response_base: 0.90
  response_slope: 0.20
  open_to_work_mult: 1.05
  notice_good_days: 30
  notice_good_mult: 1.03
  notice_long_days: 90
  notice_long_mult: 0.97
  floor: 0.55
  ceil: 1.10

# used only when a candidate's template has no judge grade (new/unseen data).
fallback_components:
  role_fit: 0.30
  must_have_evidence: 0.25
  ranking_evidence: 0.25
  experience_fit: 0.10
  domain_fit: 0.10
